<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularios</title>
</head>
<body>
  <h1>LOGIN</h1>

  <form action="cadastro.php" method="post" autocomplete="on">
    <fieldset>
      <p>
        <label for="inome">Email</label>
        <input type="text" name="name" id="iname" placeholder=" Digite seu email " required>
      </p>
      <p>
        <label for="isenha">Senha</label>
        <input type="password" name="senha" id="isenha" required>
      </p>
    </fieldset>
      <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
      </p>
  </form>

  <h1>CADASTRO</h1>

  <form action="">
    <fieldset>
      <legend>Dados Pessoais</legend>
      <p>
        <label for="inome">Nome Completo</label>
        <input type="text" name="nome" id="inome" placeholder="Digite seu nome" required>
      </p>
      <p>
        <label for="idata">Data de Nascimento</label>
        <input type="date" name="data" id="idata" required>
      </p>
      <p>
        <label for="icel">Contato</label>
        <input type="tel" name="tel" id="icel" placeholder="(XX) XXXXX-XXXX" required>
      </p>
      <p>
        <label for="icpf">CPF</label>
        <input type="text" name="cpf" id="icpf" placeholder="Digite seu CPF" required>
      </p>
      <p>
        <label for="aff">pes</label>
        <input type="search" name="aff" id="aff">
      </p>
    </fieldset>

      <fieldset>
        <legend>
          <p>Sexo</p>
        </legend>
        <p>
          <input type="radio" name="sexo" id="imasc" value="Masc"> <label for="imasc">Masculino</label> <br>
          <input type="radio" name="sexo" id="ifem" value="Fem"> F<label for="ifem">eminino</label> <br>
          <input type="radio" name="sexo" id="ioutro" value="Outro"> <label for="ioutro">Outro</label>
        </p>
      </fieldset>

      <fieldset>
        <legend>Qual o Final do CPF</legend>
        <input type="checkbox" name="num" id="inum"> <label for="inum">709.***.***-72</label> <br>
        <input type="checkbox" name="num" id="inum2"> <label for="inum2">123.***.***-45</label> <br>
        <input type="checkbox" name="num" id="inum3"> <label for="inum3">709.***.***-88</label>
      </fieldset>
  </form>

  <form action="cadastro.php" method="post">
    <fieldset>
      <legend>Área</legend>
      <p>
        <label for="iestados">Estado: </label>
        <select name="estados" id="iestados">
          <option value="" selected>----Escolha----</option>
          <option value="AC">Acre</option>
          <option value="AL">Alagoas</option>
          <option value="BA">Bahia</option>
          <option value="CE">Ceára</option>
          <option value="PE">Pernambuco</option>
          <option value="SP">São Paulo</option>
          <option value="RJ">Rio de Janeiro</option>
          <option value="MG">Minas Gerais</option>
        </select>
      </p>
      <p>
        <label for="">Cidade</label>
        <input type="text" name="cidade" id="icidade" list="listcity">
        <datalist id="listcity">
          <option value="Natal"> 
          <option value="Mossoró">
          <option value="Parnamirin">
          <option value="Nova Cruz">
          <option value="Macaiba">
          <option value="Caíco">Caíco</option>
          <option value="Santa Cruz"></option>
          <option value="Touros"></option>
          <option value="Apodi"></option>
          <option value="Assu"></option>
          <option value="Extremoz"></option>

        </datalist>
      </p>
    </fieldset>

    <p>
      <label for="imensg">Mensagens: </label> <br>
      <textarea name="msg" id="ismesg" cols="90" rows="5"></textarea>
    </p>
    <p>
      <input type="submit" value="Enviar">
      <input type="reset" value="Limpar">
    </p>

  </form>
  
</body>
</html>
